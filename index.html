<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <title>icceph | Obfuscator Lua</title>
    <link rel="icon" type="image/png" href="https://icceph.vercel.app/logo.png" />

    <!-- SEO Metadata -->
    <meta name="description" content="iCceph is an advanced, high-performance Lua virtualization and obfuscation platform." />
    <meta name="google-site-verification" content="ZLnlTlYF38XSZF3gUcPOnrRe_7sJ4MtP8U33K78iQvY" />

    <!-- 🔒 1. هێنانەکردنی سکریپتی فەرمی کڵاودفلێر تێرنستایل -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
    
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background-color: #0f111a;
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* 🔒 سندوقی پشکنینی کڵاودفلێر */
        #security-gate {
            background: #161925;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.5);
            text-align: center;
            max-width: 400px;
            width: 90%;
        }
        #security-gate h2 { margin-bottom: 10px; font-size: 22px; color: #00ffcc; }
        #security-gate p { color: #a0a5b5; margin-bottom: 20px; font-size: 14px; }

        /* 🌐 پێکهاتەی وێبسایتەکە (سەرەتا شاردراوەیە تا تێرنستایل سەرکەوتووە دەبێت) */
        #main-wrapper {
            display: none; 
            width: 100vw;
            height: 100vh;
            flex-direction: column;
        }

        .top-navbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 40px;
            background: #11131c;
            border-bottom: 1px solid #1f2335;
        }
        .logo { font-size: 24px; font-weight: bold; color: #00ffcc; display: flex; align-items: center; gap: 10px; }
        .logo img { width: 30px; height: 30px; border-radius: 50%; }

        .menu-toggle { display: flex; flex-direction: column; gap: 6px; cursor: pointer; }
        .menu-toggle .line { width: 30px; height: 3px; background-color: #ffffff; border-radius: 2px; }

        .main-container { padding: 40px; flex: 1; }
        .app-section { display: none; }
        .active-section { display: block !important; }

        .textarea-container { display: flex; flex-direction: column; gap: 15px; margin-top: 20px; }
        textarea { width: 100%; height: 180px; background: #161925; border: 1px solid #1f2335; border-radius: 8px; color: #00ffaa; padding: 15px; resize: none; }
        .action-btn { background: #00ffcc; color: #0b0c10; border: none; padding: 14px; font-size: 16px; font-weight: bold; border-radius: 8px; cursor: pointer; }
        .hidden { display: none !important; }
        #loading-overlay { color: #00ffcc; margin-top: 10px; font-weight: bold; }
    </style>
</head>
<body>

    <!-- 🔒 بەشی یەکەم: دەروازەی ئەمنی (Turnstile Security Gate) -->
    <div id="security-gate">
        <h2>Security Verification</h2>
        <p>Please check the box below to unlock iCceph Console.</p>
        
        <!-- 🛠️ لێرەدا دەبێت Site Key ی خۆت لە کڵاودفلێر دابنێیت -->
        <div class="cf-turnstile" 
             data-sitekey="1x00000000000000000000AA" 
             data-callback="onTurnstileSuccess">
        </div>
    </div>

    <!-- 🌐 بەشی دووەم: تەواوی وێبسایتەکە دوای دڵنیابوونەوە -->
    <div id="main-wrapper">
        <header class="top-navbar">
            <div class="logo">
                <img src="https://icceph.vercel.app/logo.png" alt="Logo">
                <span>iCceph</span>
            </div>
            <div class="menu-toggle" onclick="toggleMenu()">
                <div class="line"></div>
                <div class="line"></div>
            </div>
        </header>

        <main class="main-container">
            <div id="home-section" class="app-section active-section">
                <h2>Home Console</h2>
                <p style="color: #a0a5b5; margin-top: 10px;">Verification completed successfully. Welcome back!</p>
            </div>

            <div id="obfuscator-section" class="app-section">
                <h2>Custom VM Obfuscator</h2>
                <div class="textarea-container">
                    <textarea id="input-script" placeholder="Paste your Lua Script code here..."></textarea>
                    <button class="action-btn" onclick="startLocalObfuscation()">Encrypt & Protect Script</button>
                    <div id="loading-overlay" class="hidden">Processing Encryption Layer...</div>
                    <textarea id="output-script" placeholder="Protected code output will appear here..." readonly></textarea>
                </div>
            </div>
        </main>
    </div>

    <script>
        // 🔑 کاتێک پشکنینی کڵاودفلێر سەرکەوتوو دەبێت، ئەم فەنکشنە خۆکار ڕەن دەبێت
        function onTurnstileSuccess(token) {
            console.log("Turnstile Token Generated: " + token);
            
            // شاردنەوەی گەیتی پاراستن
            document.getElementById('security-gate').style.display = 'none';
            
            // گۆڕینی شێوازی باکگراوند بۆ پڕ بە شاشە و نیشاندانی سایتەکە
            document.body.style.alignItems = 'stretch';
            document.getElementById('main-wrapper').style.display = 'flex';
        }

        function toggleMenu() {
            const home = document.getElementById('home-section');
            const obf = document.getElementById('obfuscator-section');
            if (home.classList.contains('active-section')) {
                home.classList.remove('active-section');
                obf.classList.add('active-section');
            } else {
                obf.classList.remove('active-section');
                home.classList.add('active-section');
            }
        }
    </script>
    <script src="index.js"></script>
</body>
</html>
