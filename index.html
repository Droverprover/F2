<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>icceph Security Console</title>
    
    <!-- Google Site Verification -->
    <meta name="google-site-verification" content="ZLnlTlYF38XSZF3gUcPOnrRe_7sJ4MtP8U33K78iQvY" />
    <meta name="description" content="Welcome to icceph, the ultimate environment for Lua script protection, optimization, and virtualization.">
    
    <!-- Favicon (بۆ ئەوەی لۆگۆی سایتەکەت لە ناو گوگڵ سیرچدا نیشان بدرێت) -->
    <!-- وێنەی لۆگۆکەت بە ناوی logo.png لە تەنیشت ئەم فایلە دابنێ -->
    <link rel="icon" type="image/png" href="logo.png">
    
    <!-- لۆدکردنی Tailwind CSS و Cloudflare Turnstile -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body id="main-body" class="bg-white text-zinc-900 min-h-screen font-sans antialiased transition-colors duration-500">

    <!-- ١. لاپەڕەی سپی تاقیکردنەوە (تاکە شت کە هاکەر دەیبینێت و هیچ دیزاینێکی تێدا نییە بۆ دزین) -->
    <div id="verify-page" class="min-h-screen flex flex-col items-center justify-center p-6 space-y-6">
        
        <!-- لۆگۆی جوانکاری لەسەر شاشەی لۆدینگ پێش چوونە ژوورەوە -->
        <div class="flex flex-col items-center space-y-3">
            <div class="w-16 h-16 rounded-full border-2 border-emerald-500 bg-gradient-to-br from-emerald-400 via-zinc-900 to-zinc-950 shadow-xl flex items-center justify-center font-bold text-white text-xl font-mono animate-pulse">iC</div>
            <span class="text-2xl font-black tracking-wider text-zinc-900 font-mono">icceph</span>
        </div>

        <div class="text-center space-y-2">
            <h1 class="text-xl font-bold tracking-tight text-zinc-800">پشکنینی وێبگەڕەکەت پێش ئەوەی بچیتە ناو icceph</h1>
            <p class="text-xs text-zinc-500">تکایە پشکنینی ئاسایش تەواو بکه بۆ ئەوەی بەردەوام بیت.</p>
        </div>
        
        <!-- سندوقی کلاودفلێیەر -->
        <div class="p-4 bg-zinc-50 rounded-xl border border-zinc-200/80 shadow-sm">
            <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-callback="onVerificationSuccess"></div>
        </div>
    </div>

    <!-- ٢. ئەم بەشە بە تەواوی بەتاڵە و بە جاڤاسکریپتە قفڵکراوەکەت پڕ دەبێتەوە دوای سەرکەوتن -->
    <div id="app-layout" class="hidden min-h-screen flex flex-col justify-between"></div>

    <!-- ٣. بەستنەوەی فایلی جاڤاسکریپتە قفڵکراوەکەت (index.js) -->
    <script src="index.js"></script>

</body>
</html>
