<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <meta name="google-site-verification" content="iqpy3fHG8EqEGjYyxJ5Qm3_y7rsnHRinUJ9WrpAXyHk" />

    <title>ICCEPH VM - Ultimate Lua Obfuscator</title>
    <meta name="description" content="Protect your Roblox Lua scripts with ICCEPH Custom VM Obfuscator. Free and universal support.">
    
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: #111827;
            --accent: #3b82f6;
            --accent-hover: #1d4ed8;
            --text-color: #f3f4f6;
            --border-color: #1f2937;
            --textarea-bg: #030712;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 750px;
            border: 1px solid var(--border-color);
        }

        .logo-container {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 25px;
        }

        h1 {
            text-align: center;
            color: #38bdf8;
            margin-bottom: 25px;
            font-size: 30px;
            letter-spacing: 1px;
        }

        .actions-row {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
        }

        .btn {
            background-color: var(--accent);
            color: white;
            border: none;
            padding: 14px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: all 0.2s ease;
            flex: 1;
            text-align: center;
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 8px;
        }

        .btn:hover {
            background-color: var(--accent-hover);
            transform: translateY(-1px);
        }

        .btn-upload {
            background-color: #059669;
        }
        .btn-upload:hover {
            background-color: #047857;
        }

        #file-input {
            display: none;
        }

        textarea {
            width: 100%;
            height: 180px;
            background-color: var(--textarea-bg);
            color: #34d399;
            border: 1px solid var(--border-color);
            border-radius: 10px;
            padding: 14px;
            box-sizing: border-box;
            font-family: 'Consolas', 'Courier New', monospace;
            resize: vertical;
            margin-bottom: 15px;
            direction: ltr;
            text-align: left;
            font-size: 14px;
        }

        .output-label {
            margin-bottom: 8px;
            display: block;
            font-weight: bold;
            color: #9ca3af;
        }

        .footer-buttons {
            display: flex;
            gap: 12px;
        }

        .btn-secondary {
            background-color: #4b5563;
        }
        .btn-secondary:hover {
            background-color: #374151;
        }

        /* 🛡️ شاشەی فەرمی و نوێی Cloudflare Turnstile Overlay */
        .overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(11, 15, 25, 0.98); /* تاری بەهێز بۆ سەرنج خستنە سەر سندوقەکە */
            z-index: 9999;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            backdrop-filter: blur(8px); /* لێڵکردنی پشتەوە وەک سیستمی ڕاستەقینە */
        }

        /* سندوقی فەرمی کڵاودفلێر دۆخی تاریک (Turnstile Dark Mode) */
        .cf-box {
            background: #1d2432;
            padding: 12px 18px;
            border-radius: 5px;
            width: 300px;
            color: #f3f4f6;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.4);
            border: 1px solid #2d3748;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        }
        .cf-left { display: flex; align-items: center; gap: 14px; }
        
        .cf-checkbox {
            width: 26px; height: 26px;
            border: 2px solid #4a5568;
            border-radius: 4px;
            cursor: pointer;
            display: flex;
            justify-content: center;
            align-items: center;
            background: #131722;
            transition: background 0.2s, border-color 0.2s;
        }
        .cf-checkbox:hover {
            border-color: #f38020; /* ڕەنگی پرتەقاڵی کڵاودفلێر لە کاتی هۆڤەر */
        }
        .cf-text { font-size: 14px; font-weight: 400; color: #e2e8f0; user-select: none; }
        
        /* سپێنەری شینی کڵاودفلێر */
        .cf-spinner {
            display: none; width: 14px; height: 14px;
            border: 2px solid #2d3748; border-top: 2px solid #2563eb;
            border-radius: 50%; animation: cf-spin 0.8s linear infinite;
        }
        .cf-check-icon { display: none; color: #10b981; font-weight: bold; font-size: 18px; }
        
        .cf-right {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
        }
        .cf-privacy {
            font-size: 9px;
            color: #718096;
            text-decoration: none;
        }

        /* بەشی لۆدینگی مەکینەی ناوەوە */
        .secret-loading { text-align: center; display: none; }
        .spinner {
            width: 45px; height: 45px;
            border: 3px solid rgba(255, 255, 255, 0.03);
            border-top: 3px solid #ffffff; /* سپی ڕووندەکاتەوە لەگەڵ لۆگۆکەت */
            border-radius: 50%; animation: cf-spin 1s linear infinite;
            margin: 0 auto 20px auto;
        }
        @keyframes cf-spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>

    <div id="overlay" class="overlay">
        <div id="cf-container" class="cf-box">
            <div class="cf-left">
                <div id="cf-check" class="cf-checkbox" onclick="triggerCloudflareCheck()">
                    <div id="cf-spin" class="cf-spinner"></div>
                    <span id="cf-icon" class="cf-check-icon">✓</span>
                </div>
                <span class="cf-text">Verify you are human</span>
            </div>
            <div class="cf-right">
                <svg width="32" height="32" viewBox="0 0 48 48" fill="none"><path d="M22 6C13.1634 6 6 13.1634 6 22C6 30.8366 13.1634 38 22 38C29.6234 38 36.0024 32.6687 37.5847 25.5H29.4153C28.0024 28.6687 25.2234 31 22 31C17.0294 31 13 26.9706 13 22C13 17.0294 17.0294 13 22 13C25.2234 13 28.0024 15.3313 29.4153 18.5H37.5847C36.0024 11.3313 29.6234 6 22 6Z" fill="#F38020"/></svg>
                <a href="#" class="cf-privacy" onclick="event.preventDefault();">Privacy</a>
            </div>
        </div>

        <div id="secret-container" class="secret-loading">
            <div class="spinner"></div>
            <h2 style="margin:0 0 8px 0; color:#fff; font-size: 22px; font-weight: 500; letter-spacing: 0.5px;">Generating Custom VM Machine...</h2>
            <p style="color:#9ca3af; margin:0; font-size:13px; font-family: monospace;">Constructing layout with requested character block...</p>
        </div>
    </div>

    <div class="container">
        <div id="logo-area" class="logo-container"></div>
        
        <h1>ICCEPH LUA VM OBFUSCATOR</h1>
        
        <div class="actions-row">
            <label for="file-input" class="btn btn-upload">Upload File 📂</label>
            <input type="file" id="file-input" accept=".lua,.txt">
            
            <button class="btn" id="lock-btn" onclick="openVerification()">Protect Script 🔒</button>
        </div>

        <textarea id="input-code" placeholder="-- Paste your Roblox code (Lua) here or upload a file..."></textarea>

        <span class="output-label">Protected Output Code:</span>
        <textarea id="output-code" readonly placeholder="-- Your protected script will appear here..."></textarea>

        <div class="footer-buttons">
            <button class="btn btn-secondary" onclick="copyCode()">Copy Code 📋</button>
            <button class="btn btn-secondary" onclick="downloadCode()">Download 📥</button>
        </div>
    </div>

    <script src="index.js"></script>
</body>
</html>
