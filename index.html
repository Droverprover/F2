<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>icceph Security Console - Trusted Lua Obfuscator</title>
    
    <!-- 🚀 لۆگۆی نوێی سایتەکەت لێرە ناسێنراوە -->
    <link rel="icon" href="./favicon.png" type="image/png">
    <link rel="apple-touch-icon" href="./favicon.png">

    <!-- کلیلەکەی گوگڵ بۆ ناسینەوەی سایتەکەت -->
    <meta name="google-site-verification" content="ZLnlTlYF38XSZF3gUcPOnrRe_7sJ4MtP8U33K78iQvY" />

    <!-- Tailwind CSS بۆ دیزاینی لاپەڕەکە -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- سیستەمی پاراستنی Cloudflare Turnstile -->
    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>
</head>
<body id="main-body" class="bg-white text-zinc-900 min-h-screen flex flex-col transition-colors duration-500 font-sans antialiased selection:bg-emerald-500/30">

    <!-- بەشی پشکنینی سەرەتایی Cloudflare (Verify Page) -->
    <div id="verify-page" class="flex-grow flex flex-col items-center justify-center p-6 text-center space-y-6 max-w-sm mx-auto">
        <div class="space-y-2 animate-fade-in">
            <h1 class="text-3xl font-black tracking-tight text-zinc-900">Security Check</h1>
            <p class="text-sm text-zinc-500 font-medium">Please complete the verification below to access icceph Security Console.</p>
        </div>
        
        <!-- سندوقی ڤێریفای Cloudflare -->
        <div class="bg-zinc-50 border border-zinc-200 p-4 rounded-2xl shadow-sm w-full flex justify-center">
            <div class="cf-turnstile" data-sitekey="1x00000000000000000000AA" data-callback="cloudflareCallback"></div>
        </div>
        
        <p class="text-xs text-zinc-400 font-medium flex items-center justify-center gap-1.5">
            <svg class="w-3.5 h-3.5 text-emerald-500" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M9 12l2 2 4-4m5.618-4.016A11.955 11.955 0 0112 2.944a11.955 11.955 0 01-8.618 3.04A12.02 12.02 0 003 9c0 5.591 3.824 10.29 9 11.622 5.176-1.332 9-6.03 9-11.622 0-1.042-.133-2.052-.382-3.016z"/></svg>
            Secured by Cloudflare Turnstile
        </p>
    </div>

    <!-- ئەم بەشە دوای سەرکەوتنی ڤێریفای بە جافاسکرێپت پڕ دەبێتەوە -->
    <div id="app-layout" class="min-h-screen flex flex-col hidden"></div>

    <!-- بەستنەوەی فایلی جافاسکرێپتی سەرەکی -->
    <script src="./index.js"></script>
</body>
</html>
